<div class="filter-box">
    <h3>Filter</h3>

    <div class="filter-control">
        <label for="category-select">Category</label>
        <select id="category-select" class="form-select" onchange="setCategory(this)">
            <option value="0">Show All</option>
        </select>
    </div>

    <div class="price-inputs">
        <div>
            <label for="min-price">Min Price</label>
            <input type="number" id="min-price" class="form-control" value="0" min="0" max="1500">
        </div>

        <div>
            <label for="max-price">Max Price</label>
            <input type="number" id="max-price" class="form-control" value="1500" min="0" max="1500">
        </div>
    </div>

    <div class="filter-control">
        <label for="subcategory-select">Color</label>
        <select id="subcategory-select" class="form-select" onchange="setSubcategory(this)">
            <option value="">Show All</option>
            <option>Black</option>
            <option>White</option>
            <option>Gray</option>
            <option>Blue</option>
            <option>Red</option>
            <option>Brown</option>
            <option>Silver</option>
            <option>Charcoal</option>
            <option>Navy</option>
            <option>Green</option>
            <option>Orange</option>
            <option>Yellow</option>
            <option>Pink</option>
            <option>Clear</option>
            <option>Tan</option>
            <option>Burgundy</option>
            <option>Maroon</option>
            <option>Mint</option>
            <option>Lavender</option>
            <option>Teal</option>
            <option>Olive</option>
            <option>Khaki</option>
            <option>Turquoise</option>
        </select>
    </div>

    <button class="filter-button" onclick="applyFilters()">Apply Filters</button>
</div>

<div id="content" class="content"></div>
