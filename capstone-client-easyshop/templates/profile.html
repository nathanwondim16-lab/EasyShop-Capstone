<div class="account-sidebar"></div>

<div id="content" class="content-form profile-page">
  <p class="page-label">Account Settings</p>
  <h1>Profile</h1>

  <div class="profile-grid">
    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="firstName" value='{{firstName}}'>
      <label for="firstName">First Name</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="lastName" value='{{lastName}}'>
      <label for="lastName">Last Name</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="phone" value='{{phone}}'>
      <label for="phone">Phone</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="email" value='{{email}}'>
      <label for="email">Email</label>
    </div>

    <div class="form-floating mb-3 full-width">
      <input type="text" class="form-control" id="address" value='{{address}}'>
      <label for="address">Address</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="city" value='{{city}}'>
      <label for="city">City</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="state" value='{{state}}'>
      <label for="state">State</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="zip" value='{{zip}}'>
      <label for="zip">Zip</label>
    </div>
  </div>

  <button class="primary-action" onclick="saveProfile()">Update Profile</button>
</div>
